name: award-badges-cron

on:
  schedule:
    # 日次・JST 04:00（UTC 19:00）
    - cron: '0 19 * * *'
  workflow_dispatch:

concurrency:
  group: award-badges-cron
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Hit Vercel cron endpoint
        env:
          CRON_TARGET_URL: ${{ secrets.AWARD_BADGES_TARGET_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_TARGET_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::AWARD_BADGES_TARGET_URL or CRON_SECRET not set"
            exit 1
          fi
          http_code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            --max-time 120 \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$CRON_TARGET_URL")
          echo "HTTP $http_code"
          cat /tmp/resp.json || true
          echo ""
          if [ "$http_code" != "200" ]; then
            exit 1
          fi
