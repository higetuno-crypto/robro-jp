name: fetch-games-cron

# Vercel Hobby プランは daily cron しか回せないため、GitHub Actions から
# /api/cron/fetch-games を定期的に叩く。
# トラフィック増やして Pro に上げるタイミングで vercel.json の crons を復活させ
# ここを disable する（Actionsタブから手動でworkflow無効化可能）。

on:
  schedule:
    # 10分おき。GitHub Actions の cron は最短5分だが、ここはCLAUDE.md準拠で10分。
    - cron: '*/10 * * * *'
  workflow_dispatch: # 手動トリガ可

concurrency:
  group: fetch-games-cron
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Hit Vercel cron endpoint
        env:
          CRON_TARGET_URL: ${{ secrets.CRON_TARGET_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_TARGET_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_TARGET_URL or CRON_SECRET not set"
            exit 1
          fi
          # -f で 4xx/5xx を失敗として扱う。--max-time でハング防止。
          http_code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            --max-time 120 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$CRON_TARGET_URL")
          echo "HTTP $http_code"
          cat /tmp/resp.json || true
          echo ""
          if [ "$http_code" != "200" ]; then
            exit 1
          fi
